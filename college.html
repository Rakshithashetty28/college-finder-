<!DOCTYPE html>
<html>
<head>
<title>College Details</title>
<style>
body{font-family:Segoe UI;background:#f4f6fb;padding:30px}
.box{background:white;padding:20px;border-radius:15px}
</style>
</head>
<body>

<a href="main.html">← Back</a>

<div class="box" id="box"></div>

<script>
const c=JSON.parse(localStorage.getItem("college"));
document.getElementById("box").innerHTML=`
<h2>${c.name}</h2>
<p><b>Courses:</b> ${c.courses.join(", ")}</p>
<p><b>State:</b> ${c.state}</p>
<p><b>Location:</b> ${c.location}</p>
`;
</script>

</body>
</html>
