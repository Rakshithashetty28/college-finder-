<!DOCTYPE html>
<html>
<head>
<title>College Finder</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#4facfe,#00f2fe);
min-height:100vh;
overflow-x:hidden;
}

/* Animated Background */

.background-animation{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background:radial-gradient(circle at 20% 30%,rgba(255,255,255,0.3),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,0.2),transparent 40%);
animation:moveBg 10s infinite alternate;
}

@keyframes moveBg{
0%{transform:scale(1)}
100%{transform:scale(1.2)}
}

/* Title */

h1{
text-align:center;
margin-top:30px;
font-size:36px;
color:white;
letter-spacing:1px;
text-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* Filters */

.filters{
display:flex;
justify-content:center;
gap:15px;
margin:30px auto;
padding:20px;
width:85%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(12px);
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
flex-wrap:wrap;
}

.filters input,
.filters select{

padding:10px 14px;
border-radius:8px;
border:none;
font-size:14px;
min-width:170px;
outline:none;
transition:0.3s;
}

.filters input:focus,
.filters select:focus{

transform:scale(1.05);
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* Grid */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
padding:20px 50px 40px;

}

/* Card */

.card{

background:white;
padding:22px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
transition:all 0.35s ease;
position:relative;
overflow:hidden;

}

/* Glow Border */

.card::after{
content:"";
position:absolute;
inset:0;
border-radius:18px;
padding:2px;
background:linear-gradient(45deg,#4facfe,#00f2fe,#43e97b,#38f9d7);
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
opacity:0;
transition:0.4s;
}

.card:hover::after{
opacity:1;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

/* Badge */

.badge{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
color:white;
padding:6px 14px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-bottom:10px;
}

/* College name */

.card h3{
margin:6px 0;
font-size:20px;
}

/* Package */

.package{
color:#28a745;
font-weight:600;
}

/* Buttons */

.website,
.map{

padding:9px 16px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:12px;
margin-right:6px;
font-size:13px;
font-weight:500;
transition:0.3s;
}

.website{

background:linear-gradient(135deg,#28a745,#20c997);
color:white;

}

.map{

background:linear-gradient(135deg,#007bff,#00c6ff);
color:white;

}

.website:hover,
.map:hover{

transform:scale(1.08);
box-shadow:0 6px 15px rgba(0,0,0,0.25);

}

/* Mobile */

@media(max-width:600px){

.filters{
width:95%;
}

.grid{
padding:15px;
}

}

</style></head>

<body>
    <div class="background-animation"></div>

<h1>🎓 College Finder</h1>

<div class="filters">
    <input type="text" id="search" placeholder="Search College Name...">

    <select id="categoryFilter">
        <option value="">All Categories</option>
        <option value="IIT">IIT</option>
        <option value="NIT">NIT</option>
        <option value="IIM">IIM</option>
    </select>

    <select id="stateFilter">
        <option value="">All States</option>
    </select>

    <select id="courseFilter">
        <option value="">All Courses</option>
        <option value="BTech">BTech</option>
        <option value="MTech">MTech</option>
        <option value="MBA">MBA</option>
    </select>
</div>

<div id="collegeContainer" class="grid"></div>

<script>
let allColleges = [];

fetch("full_production_colleges_dataset.json").then(res => res.json())
.then(data => {
    allColleges = data;
    populateStates(data);
    displayColleges(data);
})
.catch(err => console.error("Error loading colleges:", err));

function populateStates(data) {
    const states = [...new Set(data.map(c => c.state))].sort();
    const stateFilter = document.getElementById("stateFilter");

    states.forEach(state => {
        const option = document.createElement("option");
        option.value = state;
        option.textContent = state;
        stateFilter.appendChild(option);
    });
}

function displayColleges(data) {
    const container = document.getElementById("collegeContainer");
    container.innerHTML = "";

    if(data.length === 0){
        container.innerHTML = "<p style='text-align:center;'>No colleges found.</p>";
        return;
    }

    data.forEach(college => {
        container.innerHTML += `
        <div class="card">
            <div class="badge">${college.category}</div>
            <h3>${college.name}</h3>
            <p><b>Location:</b> ${college.city}, ${college.state}</p>
            <p><b>Exam:</b> ${college.exam}</p>
            <p><b>Fees:</b> ${college.fees_per_year || college.fees_total || "N/A"}</p>
            <p><b>Ranking:</b> ${college.ranking_nirf_2024 || "N/A"}</p>
            <p class="package">Avg Package: ${college.average_package || "N/A"}</p>
            <p class="package">Highest Package: ${college.highest_package || "N/A"}</p>

            <!-- Safe Official Website Link -->
            <a class="website"
               href="https://www.google.com/search?q=${encodeURIComponent(college.name + ' official website')}"
               target="_blank">
               Visit Official Website
            </a>

            <!-- Google Maps Link -->
            <a class="map"
               href="https://www.google.com/maps/search/${encodeURIComponent(college.name)}"
               target="_blank">
               View on Map
            </a>
        </div>
        `;
    });
}

document.querySelectorAll("input, select").forEach(element => {
    element.addEventListener("input", filterColleges);
});

function filterColleges() {
    const search = document.getElementById("search").value.toLowerCase();
    const category = document.getElementById("categoryFilter").value;
    const state = document.getElementById("stateFilter").value;
    const course = document.getElementById("courseFilter").value;

    const filtered = allColleges.filter(c =>
        c.name.toLowerCase().includes(search) &&
        (!category || c.category === category) &&
        (!state || c.state === state) &&
        (!course || (c.courses && c.courses.includes(course)))
    );

    displayColleges(filtered);
}
</script>

</body>
</html>
